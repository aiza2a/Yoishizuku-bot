services:
  chatgptbot:
    container_name: Yoishizuku-bot
    # ── 自定义镜像（GitHub Actions 自动构建） ──
    # 改用 `yym68686/chatgpt@sha256:...` 以使用上游基础镜像+卷挂载覆写
    image: ghcr.io/aiza2a/yoishizuku-bot:latest
    user: "10001:10001"
    env_file:
      - ./.env
    environment:
      BOT_TOKEN: ${BOT_TOKEN:?BOT_TOKEN is required}
      API_KEY: ${API_KEY:?API_KEY is required}
      BASE_URL: ${BASE_URL:?BASE_URL is required}
      MODEL: ${MODEL:-deepseek-v4-flash-free}
      TZ: Asia/Shanghai
      PORT: ${PORT:-8080}
    volumes:
      # ── 持久化数据（必需） ──
      - ./data/user_configs:/home/user_configs
      - ./data/memory:/home/memory_data
      - ./data/roles:/home/role_data
      - ./data/access:/home/access_data
      # ── 可选覆写：本地文件会覆盖镜像内置版本，免重建调试用 ──
      # - ./app/bot.py:/home/bot.py:ro
      # - ./app/config.py:/home/config.py:ro
      # - ./app/overrides/memory_store.py:/home/memory_store.py:ro
      # - ./app/overrides/role_dialogue_store.py:/home/role_dialogue_store.py:ro
      # - ./app/overrides/access_control.py:/home/access_control.py:ro
      # - ./app/overrides/i18n_override.py:/home/i18n_override.py:ro
      # - ./app/overrides/decorators_override.py:/home/utils/decorators.py:ro
      # - ./app/overrides/bot_utils_scripts.py:/home/utils/scripts.py:ro
      # - ./app/overrides/aient_base.py:/home/aient/aient/models/base.py:ro
      # - ./app/overrides/aient_chatgpt.py:/home/aient/aient/models/chatgpt.py:ro
      # - ./app/overrides/aient_utils_scripts.py:/home/aient/aient/utils/scripts.py:ro
      # - ./app/overrides/aient_run_python.py:/home/aient/aient/plugins/run_python.py:ro
      # - ./persona/persona.env:/home/persona.env:ro
      # - ./persona/systemprompt.md:/home/persona_systemprompt.md:ro
      # - ./persona/start_message.txt:/home/persona_start_message.txt:ro
      # - ./persona/bot_description.txt:/home/persona_bot_description.txt:ro
      # - ./scripts/healthcheck.py:/home/scripts/healthcheck.py:ro
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 384m
    cpus: 1.0
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "python", "/home/scripts/healthcheck.py"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
